<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>君の好きなアイスを当てる</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fff7ec;
    --straw:#ffb6c9;
    --straw-deep:#ff8fa8;
    --mint:#bdeee0;
    --sky:#bfe8ff;
    --choco:#6b4226;
    --choco-deep:#4a2c17;
    --sun:#ffd166;
    --ink:#4a2c17;
    --paper:#fffdf8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 8%, rgba(191,232,255,0.55), transparent 45%),
      radial-gradient(circle at 85% 0%, rgba(189,238,224,0.5), transparent 40%),
      linear-gradient(180deg, var(--cream), #fff3e4 55%, #ffe9da 100%);
    font-family:'Kiwi Maru', serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:28px 14px 60px;
    overflow-x:hidden;
  }
  .stage{ width:100%; max-width:460px; }

  header{ text-align:center; margin-bottom:18px; }
  .eyebrow{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:0.28em;
    color:var(--straw-deep);
    margin-bottom:6px;
  }
  h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:clamp(22px,6.5vw,30px);
    margin:0 0 10px;
    line-height:1.4;
  }
  h1 span{
    display:inline-block;
    background:linear-gradient(180deg, var(--choco), var(--choco-deep));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .lyrics{
    font-size:13px;
    line-height:1.85;
    color:#7a5a3f;
    white-space:pre-line;
  }
  .lyrics .accent{
    display:block;
    margin-top:6px;
    font-weight:700;
    color:var(--straw-deep);
  }

  .card{
    background:var(--paper);
    border-radius:26px;
    padding:26px 22px 24px;
    margin-top:18px;
    box-shadow:0 18px 40px -18px rgba(74,44,23,0.35), 0 2px 0 rgba(74,44,23,0.06) inset;
    position:relative;
    overflow:hidden;
    border:2px solid rgba(74,44,23,0.08);
  }
  .card::before{
    content:"";
    position:absolute;
    top:-40px; right:-40px;
    width:140px; height:140px;
    background:radial-gradient(circle, rgba(255,209,102,0.5), transparent 70%);
    pointer-events:none;
  }

  .cone-wrap{ display:flex; justify-content:center; margin-bottom:6px; }
  .cone{ position:relative; width:120px; height:150px; }
  .scoop{
    position:absolute;
    left:50%; top:0;
    transform:translateX(-50%);
    width:104px; height:104px;
    border-radius:50% 50% 46% 46%;
    background:radial-gradient(circle at 35% 30%, #f4f4f4, #d9d9d9 70%);
    box-shadow:inset 0 -10px 18px rgba(255,255,255,0.5), inset 0 8px 14px rgba(74,44,23,0.08);
    display:flex; align-items:center; justify-content:center;
    font-size:44px;
    transition:background 0.2s ease;
  }
  .waffle{
    position:absolute;
    left:50%; top:88px;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:34px solid transparent;
    border-right:34px solid transparent;
    border-top:70px solid #d99a55;
    clip-path:polygon(50% 100%, 0 0, 100% 0);
  }
  .waffle::after{
    content:"";
    position:absolute;
    top:-70px; left:-34px;
    width:68px; height:70px;
    background:
      repeating-linear-gradient(115deg, rgba(139,90,43,0.35) 0 2px, transparent 2px 12px),
      repeating-linear-gradient(65deg, rgba(139,90,43,0.35) 0 2px, transparent 2px 12px);
    clip-path:polygon(50% 100%, 0 0, 100% 0);
  }
  .cone.spinning .scoop{ animation:flavorFlip 0.12s steps(1) infinite; }
  @keyframes flavorFlip{
    0%{ transform:translateX(-50%) scale(1); }
    50%{ transform:translateX(-50%) scale(0.96) rotate(-3deg); }
    100%{ transform:translateX(-50%) scale(1); }
  }
  .cone.reveal .scoop{ animation:pop 0.55s cubic-bezier(.36,1.6,.4,1); }
  @keyframes pop{
    0%{ transform:translateX(-50%) scale(0.6) rotate(-8deg); }
    55%{ transform:translateX(-50%) scale(1.16) rotate(4deg); }
    80%{ transform:translateX(-50%) scale(0.95) rotate(-2deg); }
    100%{ transform:translateX(-50%) scale(1) rotate(0deg); }
  }

  .status-line{
    text-align:center;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--choco);
    min-height:20px;
    margin:14px 0 18px;
  }

  label.field-label{
    display:block;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:13px;
    color:var(--choco);
    margin-bottom:8px;
  }
  .guess-input{
    width:100%;
    padding:13px 16px;
    border-radius:14px;
    border:2px solid rgba(74,44,23,0.15);
    background:#fffaf3;
    font-family:'Kiwi Maru', serif;
    font-size:15px;
    color:var(--ink);
    outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .guess-input:focus{
    border-color:var(--straw-deep);
    box-shadow:0 0 0 4px rgba(255,143,168,0.18);
  }
  .guess-input:disabled{ background:#f3ede3; color:#a99378; }

  .chips{ display:flex; flex-wrap:wrap; gap:7px; margin:12px 0 4px; }
  .chip{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:12px;
    font-weight:500;
    padding:7px 12px;
    border-radius:100px;
    background:#fbeee0;
    border:1.5px solid rgba(74,44,23,0.12);
    color:#7a5a3f;
    cursor:pointer;
    transition:transform 0.12s ease, background 0.12s ease;
  }
  .chip:hover{ background:var(--mint); transform:translateY(-1px); }
  .chip:active{ transform:translateY(0); }
  .chip:disabled{ opacity:0.5; cursor:not-allowed; }

  .actions{ display:flex; gap:10px; margin-top:20px; }
  button{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    border:none;
    border-radius:100px;
    cursor:pointer;
    transition:transform 0.12s ease, box-shadow 0.12s ease, opacity 0.2s;
  }
  .btn-main{
    flex:1;
    padding:15px 10px;
    font-size:15px;
    color:#fff;
    background:linear-gradient(180deg, var(--straw-deep), #ff6f92);
    box-shadow:0 10px 20px -8px rgba(255,111,146,0.6);
  }
  .btn-main:disabled{ opacity:0.55; cursor:not-allowed; box-shadow:none; }
  .btn-main:not(:disabled):active{ transform:translateY(1px) scale(0.99); }

  .btn-retry{
    padding:15px 18px;
    font-size:14px;
    color:var(--choco);
    background:var(--mint);
    display:none;
  }
  .btn-retry:active{ transform:translateY(1px) scale(0.98); }

  .result-box{ margin-top:18px; text-align:center; display:none; }
  .result-box.show{ display:block; animation:riseIn 0.4s ease; }
  @keyframes riseIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .answer-name{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:20px;
    color:var(--choco-deep);
    margin:4px 0 2px;
  }
  .verdict{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:15px;
    padding:6px 0;
  }
  .verdict.win{ color:#e0733f; }
  .verdict.miss{ color:#8a715a; }

  footer{ text-align:center; margin-top:16px; font-size:11px; color:#9a8267; }

  .confetti-piece{
    position:fixed;
    top:-20px;
    width:9px; height:14px;
    opacity:0.95;
    border-radius:2px;
    pointer-events:none;
    z-index:50;
    animation:fall linear forwards;
  }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(540deg); opacity:0.3; } }

  .celebrate-banner{
    display:none;
    text-align:center;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:20px;
    color:var(--straw-deep);
    margin-top:6px;
    text-shadow:0 2px 0 #fff;
  }
  .celebrate-banner.show{ display:block; animation:pop2 0.5s ease; }
  @keyframes pop2{
    0%{ transform:scale(0.6); opacity:0; }
    60%{ transform:scale(1.08); opacity:1; }
    100%{ transform:scale(1); }
  }

  @media (prefers-reduced-motion:reduce){
    .confetti-piece, .celebrate-banner, .cone.spinning .scoop, .cone.reveal .scoop{ animation:none !important; }
  }
</style>
</head>
<body>
<div class="stage">
  <header>
    <div class="eyebrow">SUMMER PREDICTION GAME</div>
    <h1>君の好きな<br><span>アイスを当てる</span></h1>
    <div class="lyrics">真夏の空の下で震えながら君のことを考えます<span class="accent">好きなアイスの味はきっとー</span></div>
  </header>

  <div class="card">
    <div class="cone-wrap">
      <div class="cone" id="cone">
        <div class="scoop" id="scoop">🍦</div>
        <div class="waffle"></div>
      </div>
    </div>
    <div class="status-line" id="statusLine">まずは予想を入力してね</div>

    <label class="field-label" for="guessInput">あなたの予想</label>
    <input class="guess-input" id="guessInput" type="text" placeholder="例：バニラ" autocomplete="off">
    <div class="chips" id="chips"></div>

    <div class="actions">
      <button class="btn-main" id="revealBtn">🍨 予想する！</button>
      <button class="btn-retry" id="retryBtn">もう一回</button>
    </div>

    <div class="result-box" id="resultBox">
      <div class="celebrate-banner" id="celebrateBanner">🎉 奇跡的中！おめでとう〜！ 🎉</div>
      <div class="verdict" id="verdictLine"></div>
      <div class="answer-name" id="answerName"></div>
    </div>
  </div>

  <footer>backnumber「高嶺の花子さん」へのオマージュ企画</footer>
</div>

<!-- 自分の音声ファイルを鳴らす場合はこちら。ファイル名はご自身の環境に合わせて変更してください -->
<audio id="answerAudio" src="マイ録音 3.m4a" preload="auto"></audio>

<script>
  const flavors = [
    { name:"バニラ",         emoji:"🍦", grad:"radial-gradient(circle at 35% 30%, #fffdf3, #ffe9a8 75%)" },
    { name:"ストロベリー",     emoji:"🍓", grad:"radial-gradient(circle at 35% 30%, #ffe1ea, #ff8fab 75%)" },
    { name:"チョコレート",     emoji:"🍫", grad:"radial-gradient(circle at 35% 30%, #b9784a, #6b4022 75%)" },
    { name:"抹茶",           emoji:"🍵", grad:"radial-gradient(circle at 35% 30%, #d9edc7, #7cb85e 75%)" },
    { name:"ソーダ",          emoji:"🥤", grad:"radial-gradient(circle at 35% 30%, #dff6ff, #6fc9ef 75%)" },
    { name:"クッキー＆クリーム", emoji:"🍪", grad:"radial-gradient(circle at 35% 30%, #f7f4ee, #b79b7f 75%)" },
    { name:"大納言あずき",     emoji:"🍡", grad:"radial-gradient(circle at 35% 30%, #f3c9d6, #7a4a3a 75%)" }
  ];

  const cone = document.getElementById("cone");
  const scoop = document.getElementById("scoop");
  const statusLine = document.getElementById("statusLine");
  const guessInput = document.getElementById("guessInput");
  const chipsWrap = document.getElementById("chips");
  const revealBtn = document.getElementById("revealBtn");
  const retryBtn = document.getElementById("retryBtn");
  const resultBox = document.getElementById("resultBox");
  const celebrateBanner = document.getElementById("celebrateBanner");
  const verdictLine = document.getElementById("verdictLine");
  const answerName = document.getElementById("answerName");

  flavors.forEach(f => {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "chip";
    chip.textContent = f.name;
    chip.addEventListener("click", () => {
      guessInput.value = f.name;
      guessInput.focus();
    });
    chipsWrap.appendChild(chip);
  });

  function normalize(str){
    return str.replace(/[＆&\s　]/g, "").toLowerCase();
  }

  function randomFlavor(){
    return flavors[Math.floor(Math.random() * flavors.length)];
  }

  function playMyAudio(){
    const audioEl = document.getElementById("answerAudio");
    if (!audioEl) return;
    audioEl.currentTime = 0;
    audioEl.play().catch(() => {
      /* ファイルが同じフォルダに無い場合などはここで無視される */
    });
  }

  function playChime(win){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = win ? [523.25, 659.25, 783.99, 1046.5] : [392.0, 349.23];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime + i * 0.12);
        gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i * 0.12 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + i * 0.12 + 0.3);
        osc.connect(gain).connect(ctx.destination);
        osc.start(ctx.currentTime + i * 0.12);
        osc.stop(ctx.currentTime + i * 0.12 + 0.32);
      });
    }catch(e){ /* 再生できなくても続行 */ }
  }

  function spawnConfetti(){
    const colors = ["#ff8fa8", "#bdeee0", "#ffd166", "#bfe8ff", "#ffb6c9"];
    for (let i = 0; i < 26; i++){
      const p = document.createElement("div");
      p.className = "confetti-piece";
      p.style.left = Math.random() * 100 + "vw";
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (2.2 + Math.random() * 1.4) + "s";
      p.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 3800);
    }
  }

  function playGuess(){
    const guessRaw = guessInput.value.trim();
    if (!guessRaw){
      statusLine.textContent = "予想を入力するか、下のタグから選んでね";
      return;
    }

    revealBtn.disabled = true;
    guessInput.disabled = true;
    chipsWrap.querySelectorAll(".chip").forEach(c => c.disabled = true);
    statusLine.textContent = "占い中…！";
    cone.classList.add("spinning");
    resultBox.classList.remove("show");
    celebrateBanner.classList.remove("show");

    let ticks = 0;
    const maxTicks = 16;
    const interval = setInterval(() => {
      const f = randomFlavor();
      scoop.style.background = f.grad;
      scoop.textContent = f.emoji;
      ticks++;
      if (ticks >= maxTicks){
        clearInterval(interval);
        finalizeGuess(guessRaw);
      }
    }, 90);
  }

  function finalizeGuess(guessRaw){
    cone.classList.remove("spinning");
    const result = randomFlavor();
    scoop.style.background = result.grad;
    scoop.textContent = result.emoji;

    cone.classList.remove("reveal");
    void scoop.offsetWidth;
    cone.classList.add("reveal");

    const isWin = normalize(guessRaw) === normalize(result.name);

    answerName.textContent = result.name + " でした！";
    if (isWin){
      verdictLine.textContent = "予想的中…！奇跡だね";
      verdictLine.className = "verdict win";
      celebrateBanner.classList.add("show");
      spawnConfetti();
      playChime(true);
      playMyAudio();
      statusLine.textContent = "君の好きな味、当ててみせたね！";
    } else {
      verdictLine.textContent = `「${guessRaw}」ではなく、こちらでした`;
      verdictLine.className = "verdict miss";
      playChime(false);
      statusLine.textContent = "また今度、当ててみて";
    }
    resultBox.classList.add("show");

    retryBtn.style.display = "inline-block";
  }

  function resetGame(){
    guessInput.value = "";
    guessInput.disabled = false;
    chipsWrap.querySelectorAll(".chip").forEach(c => c.disabled = false);
    revealBtn.disabled = false;
    retryBtn.style.display = "none";
    resultBox.classList.remove("show");
    celebrateBanner.classList.remove("show");
    statusLine.textContent = "まずは予想を入力してね";
    scoop.style.background = "radial-gradient(circle at 35% 30%, #f4f4f4, #d9d9d9 70%)";
    scoop.textContent = "🍦";
    guessInput.focus();
  }

  revealBtn.addEventListener("click", playGuess);
  retryBtn.addEventListener("click", resetGame);
  guessInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !revealBtn.disabled) playGuess();
  });
</script>
</body>
</html>
