<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>君の好きなアイスを当てる</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fff7ec;
    --straw:#ffb6c9;
    --straw-deep:#ff8fa8;
    --mint:#bdeee0;
    --sky:#bfe8ff;
    --choco:#6b4226;
    --choco-deep:#4a2c17;
    --sun:#ffd166;
    --ink:#4a2c17;
    --paper:#fffdf8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 8%, rgba(191,232,255,0.55), transparent 45%),
      radial-gradient(circle at 85% 0%, rgba(189,238,224,0.5), transparent 40%),
      linear-gradient(180deg, var(--cream), #fff3e4 55%, #ffe9da 100%);
    font-family:'Kiwi Maru', serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:28px 14px 60px;
    overflow-x:hidden;
  }
  .stage{ width:100%; max-width:460px; }

  header{ text-align:center; margin-bottom:16px; }
  .eyebrow{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:0.28em;
    color:var(--straw-deep);
    margin-bottom:6px;
  }
  h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:clamp(22px,6.5vw,30px);
    margin:0;
    line-height:1.4;
  }
  h1 span{
    display:inline-block;
    background:linear-gradient(180deg, var(--choco), var(--choco-deep));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .story-card{
    background:var(--paper);
    border-radius:26px;
    padding:20px 18px 24px;
    margin-top:16px;
    box-shadow:0 18px 40px -18px rgba(74,44,23,0.35), 0 2px 0 rgba(74,44,23,0.06) inset;
    border:2px solid rgba(74,44,23,0.08);
  }
  .photo-frame{
    position:relative;
    width:100%;
    height:0;
    padding-bottom:75%;
    border-radius:18px;
    overflow:hidden;
    background:#eee;
    box-shadow:inset 0 0 0 2px rgba(74,44,23,0.06);
  }
  .photo-frame img{
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    z-index:1;
    transition:opacity 1s ease;
  }
  .photo-frame img.active{
    opacity:1;
    z-index:2;
  }

  .lyrics-box{
    margin-top:16px;
    min-height:76px;
    text-align:center;
    font-size:14.5px;
    line-height:1.95;
    color:#7a5a3f;
  }
  .lyrics-box .line{
    display:block;
    opacity:0;
    transform:translateY(6px);
    transition:opacity 0.9s ease, transform 0.9s ease;
  }
  .lyrics-box .line.show{ opacity:1; transform:translateY(0); }
  .lyrics-box .line.accent{
    font-weight:700;
    color:var(--straw-deep);
    font-family:'Zen Maru Gothic', sans-serif;
    margin-top:4px;
  }

  .guess-wrap{
    margin-top:20px;
    opacity:0;
    max-height:0;
    overflow:hidden;
    transition:opacity 0.7s ease;
  }
  .guess-wrap.ready{
    opacity:1;
    max-height:400px;
  }
  .guess-label{
    text-align:center;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:13px;
    color:var(--choco);
    margin-bottom:10px;
  }
  .chips{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:7px;
    margin-bottom:16px;
  }
  .chip{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:12.5px;
    font-weight:500;
    padding:8px 14px;
    border-radius:100px;
    background:#fbeee0;
    border:1.5px solid rgba(74,44,23,0.12);
    color:#7a5a3f;
    cursor:pointer;
    transition:transform 0.12s ease, background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .chip:hover{ transform:translateY(-1px); }
  .chip.selected{
    background:var(--straw-deep);
    border-color:var(--straw-deep);
    color:#fff;
  }

  .cta-wrap{ text-align:center; }
  #startGuessBtn{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:15.5px;
    color:#fff;
    background:linear-gradient(180deg, var(--straw-deep), #ff6f92);
    border:none;
    border-radius:100px;
    padding:15px 30px;
    cursor:pointer;
    box-shadow:0 10px 20px -8px rgba(255,111,146,0.6);
    opacity:0.5;
    transition:opacity 0.3s ease, transform 0.15s ease;
  }
  #startGuessBtn.armed{
    opacity:1;
    animation:breathe 1.8s ease-in-out infinite;
  }
  #startGuessBtn:disabled{ cursor:not-allowed; }
  @keyframes breathe{
    0%,100%{ box-shadow:0 10px 20px -8px rgba(255,111,146,0.6); }
    50%{ box-shadow:0 14px 26px -6px rgba(255,111,146,0.85); }
  }
  #startGuessBtn:not(:disabled):active{ transform:translateY(1px) scale(0.98); }

  .result-card{
    background:var(--paper);
    border-radius:26px;
    padding:26px 22px 24px;
    margin-top:18px;
    box-shadow:0 18px 40px -18px rgba(74,44,23,0.35), 0 2px 0 rgba(74,44,23,0.06) inset;
    position:relative;
    overflow:hidden;
    border:2px solid rgba(74,44,23,0.08);
    display:none;
  }
  .result-card.show{ display:block; animation:riseIn 0.5s ease; }
  @keyframes riseIn{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .result-card::before{
    content:"";
    position:absolute;
    top:-40px; right:-40px;
    width:140px; height:140px;
    background:radial-gradient(circle, rgba(255,209,102,0.5), transparent 70%);
    pointer-events:none;
  }

  .cone-wrap{ display:flex; justify-content:center; margin-bottom:6px; }
  .cone{ position:relative; width:120px; height:150px; }
  .scoop{
    position:absolute;
    left:50%; top:0;
    transform:translateX(-50%);
    width:104px; height:104px;
    border-radius:50% 50% 46% 46%;
    background:radial-gradient(circle at 35% 30%, #f4f4f4, #d9d9d9 70%);
    box-shadow:inset 0 -10px 18px rgba(255,255,255,0.5), inset 0 8px 14px rgba(74,44,23,0.08);
    display:flex; align-items:center; justify-content:center;
    font-size:44px;
    transition:background 0.2s ease;
  }
  .waffle{
    position:absolute;
    left:50%; top:88px;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:34px solid transparent;
    border-right:34px solid transparent;
    border-top:70px solid #d99a55;
    clip-path:polygon(50% 100%, 0 0, 100% 0);
  }
  .waffle::after{
    content:"";
    position:absolute;
    top:-70px; left:-34px;
    width:68px; height:70px;
    background:
      repeating-linear-gradient(115deg, rgba(139,90,43,0.35) 0 2px, transparent 2px 12px),
      repeating-linear-gradient(65deg, rgba(139,90,43,0.35) 0 2px, transparent 2px 12px);
    clip-path:polygon(50% 100%, 0 0, 100% 0);
  }
  .cone.spinning .scoop{ animation:flavorFlip 0.12s steps(1) infinite; }
  @keyframes flavorFlip{
    0%{ transform:translateX(-50%) scale(1); }
    50%{ transform:translateX(-50%) scale(0.96) rotate(-3deg); }
    100%{ transform:translateX(-50%) scale(1); }
  }
  .cone.reveal .scoop{ animation:pop 0.55s cubic-bezier(.36,1.6,.4,1); }
  @keyframes pop{
    0%{ transform:translateX(-50%) scale(0.6) rotate(-8deg); }
    55%{ transform:translateX(-50%) scale(1.16) rotate(4deg); }
    80%{ transform:translateX(-50%) scale(0.95) rotate(-2deg); }
    100%{ transform:translateX(-50%) scale(1) rotate(0deg); }
  }

  .status-line{
    text-align:center;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--choco);
    min-height:20px;
    margin:14px 0 6px;
  }
  .your-guess{
    text-align:center;
    font-size:12.5px;
    color:#9a8267;
    margin-bottom:2px;
  }
  .answer-name{
    text-align:center;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:22px;
    color:var(--choco-deep);
    margin:6px 0 2px;
    min-height:30px;
  }

  .hit-banner{
    display:none;
    text-align:center;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:22px;
    color:var(--straw-deep);
    margin-top:4px;
    text-shadow:0 2px 0 #fff;
  }
  .hit-banner.show{ display:block; animation:hitPop 0.55s ease; }
  @keyframes hitPop{
    0%{ transform:scale(0.5) rotate(-6deg); opacity:0; }
    60%{ transform:scale(1.15) rotate(3deg); opacity:1; }
    100%{ transform:scale(1) rotate(0deg); }
  }

  .miss-line{
    display:none;
    text-align:center;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:14px;
    color:#8a715a;
    margin-top:4px;
  }
  .miss-line.show{ display:block; }

  .actions{ display:flex; justify-content:center; gap:10px; margin-top:18px; }
  button.btn-retry{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--choco);
    background:var(--mint);
    border:none;
    border-radius:100px;
    padding:13px 22px;
    cursor:pointer;
    display:none;
  }
  button.btn-retry:active{ transform:translateY(1px) scale(0.98); }

  footer{ text-align:center; margin-top:18px; font-size:11px; color:#9a8267; }

  .confetti-piece{
    position:fixed;
    top:-20px;
    width:9px; height:14px;
    opacity:0.95;
    border-radius:2px;
    pointer-events:none;
    z-index:50;
    animation:fall linear forwards;
  }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(540deg); opacity:0.3; } }

  @media (prefers-reduced-motion:reduce){
    .confetti-piece, .cone.spinning .scoop, .cone.reveal .scoop, #startGuessBtn.armed, .hit-banner.show{ animation:none !important; }
  }
</style>
</head>

    </div>
    <div class="lyrics-box">
      <span class="line" id="line0">真夏の空の下で震えながら</span>
      <span class="line" id="line1">君のことを考えます</span>
      <span class="line accent" id="line2">好きなアイスの味はきっとー</span>
    </div>

    <div class="guess-wrap" id="guessWrap">
      <div class="guess-label">あなたの予想は？</div>
      <div class="chips" id="chips"></div>
      <div class="cta-wrap">
        <button id="startGuessBtn" disabled>🍨 この味で予想する！</button>
      </div>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="cone-wrap">
      <div class="cone" id="cone">
        <div class="scoop" id="scoop">🍦</div>
        <div class="waffle"></div>
      </div>
    </div>
    <div class="status-line" id="statusLine">占い中…！</div>
    <div class="your-guess" id="yourGuessLine"></div>
    <div class="answer-name" id="answerName"></div>
    <div class="hit-banner" id="hitBanner">🎉 あたり！🎉</div>
    <div class="miss-line" id="missLine"></div>
    <div class="actions">
      <button class="btn-retry" id="retryBtn">もう一度見る</button>
    </div>
  </div>

  <footer>backnumber「高嶺の花子さん」へのオマージュ企画</footer>
</div>

<script>
  const flavors = [
    { name:"バニラ",         emoji:"🍦", grad:"radial-gradient(circle at 35% 30%, #fffdf3, #ffe9a8 75%)" },
    { name:"ストロベリー",     emoji:"🍓", grad:"radial-gradient(circle at 35% 30%, #ffe1ea, #ff8fab 75%)" },
    { name:"チョコレート",     emoji:"🍫", grad:"radial-gradient(circle at 35% 30%, #b9784a, #6b4022 75%)" },
    { name:"抹茶",           emoji:"🍵", grad:"radial-gradient(circle at 35% 30%, #d9edc7, #7cb85e 75%)" },
    { name:"ソーダ",          emoji:"🥤", grad:"radial-gradient(circle at 35% 30%, #dff6ff, #6fc9ef 75%)" },
    { name:"クッキー＆クリーム", emoji:"🍪", grad:"radial-gradient(circle at 35% 30%, #f7f4ee, #b79b7f 75%)" },
    { name:"大納言あずき",     emoji:"🍡", grad:"radial-gradient(circle at 35% 30%, #f3c9d6, #7a4a3a 75%)" }
  ];

  const photos = [document.getElementById("photo0"), document.getElementById("photo1"), document.getElementById("photo2")];
  const lines = [document.getElementById("line0"), document.getElementById("line1"), document.getElementById("line2")];
  const guessWrap = document.getElementById("guessWrap");
  const chipsWrap = document.getElementById("chips");
  const startGuessBtn = document.getElementById("startGuessBtn");
  const resultCard = document.getElementById("resultCard");
  const cone = document.getElementById("cone");
  const scoop = document.getElementById("scoop");
  const statusLine = document.getElementById("statusLine");
  const yourGuessLine = document.getElementById("yourGuessLine");
  const answerName = document.getElementById("answerName");
  const hitBanner = document.getElementById("hitBanner");
  const missLine = document.getElementById("missLine");
  const retryBtn = document.getElementById("retryBtn");

  let selectedGuess = null;
  let sequenceTimers = [];

  // 予想チップを生成
  flavors.forEach(f => {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "chip";
    chip.textContent = f.name;
    chip.addEventListener("click", () => {
      selectedGuess = f;
      chipsWrap.querySelectorAll(".chip").forEach(c => c.classList.remove("selected"));
      chip.classList.add("selected");
      updateStartButtonState();
    });
    chipsWrap.appendChild(chip);
  });

  function updateStartButtonState(){
    const photosFinished = guessWrap.classList.contains("ready");
    const canStart = photosFinished && selectedGuess !== null;
    startGuessBtn.disabled = !canStart;
    startGuessBtn.classList.toggle("armed", canStart);
  }

  function randomFlavor(){
    return flavors[Math.floor(Math.random() * flavors.length)];
  }

  function spawnConfetti(big){
    const colors = ["#ff8fa8", "#bdeee0", "#ffd166", "#bfe8ff", "#ffb6c9"];
    const count = big ? 40 : 22;
    for (let i = 0; i < count; i++){
      const p = document.createElement("div");
      p.className = "confetti-piece";
      p.style.left = Math.random() * 100 + "vw";
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (2.2 + Math.random() * 1.4) + "s";
      p.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 3800);
    }
  }

  // 写真×歌詞を1枚ずつ確実に切り替える(強制リフローで初回もアニメーションを保証)
  function showPhoto(index){
    photos.forEach((p, i) => {
      if (i === index) p.classList.add("active");
      else p.classList.remove("active");
    });
  }

  function playStorySequence(){
    sequenceTimers.forEach(t => clearTimeout(t));
    sequenceTimers = [];

    photos.forEach(p => p.classList.remove("active"));
    lines.forEach(l => l.classList.remove("show"));
    guessWrap.classList.remove("ready");
    selectedGuess = null;
    chipsWrap.querySelectorAll(".chip").forEach(c => c.classList.remove("selected"));
    startGuessBtn.disabled = true;
    startGuessBtn.classList.remove("armed");

    const stepDelay = 1600;

    // 強制リフロー後に最初の写真を表示し、確実にトランジションを発火させる
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        showPhoto(0);
        lines[0].classList.add("show");
      });
    });

    sequenceTimers.push(setTimeout(() => {
      showPhoto(1);
      lines[1].classList.add("show");
    }, stepDelay));

    sequenceTimers.push(setTimeout(() => {
      showPhoto(2);
      lines[2].classList.add("show");
    }, stepDelay * 2));

    sequenceTimers.push(setTimeout(() => {
      guessWrap.classList.add("ready");
      updateStartButtonState();
    }, stepDelay * 2 + 900));
  }

  function playGuess(){
    if (startGuessBtn.disabled) return;
    resultCard.classList.add("show");
    resultCard.scrollIntoView({ behavior: "smooth", block: "center" });
    statusLine.textContent = "占い中…！";
    yourGuessLine.textContent = `あなたの予想：${selectedGuess.name}`;
    answerName.textContent = "";
    hitBanner.classList.remove("show");
    missLine.classList.remove("show");
    retryBtn.style.display = "none";
    cone.classList.remove("reveal");
    cone.classList.add("spinning");

    let ticks = 0;
    const maxTicks = 16;
    const interval = setInterval(() => {
      const f = randomFlavor();
      scoop.style.background = f.grad;
      scoop.textContent = f.emoji;
      ticks++;
      if (ticks >= maxTicks){
        clearInterval(interval);
        finalizeGuess();
      }
    }, 90);
  }

  function finalizeGuess(){
    cone.classList.remove("spinning");
    const result = randomFlavor();
    scoop.style.background = result.grad;
    scoop.textContent = result.emoji;

    cone.classList.remove("reveal");
    void scoop.offsetWidth;
    cone.classList.add("reveal");

    const isHit = selectedGuess && selectedGuess.name === result.name;

    statusLine.textContent = "君の好きなアイスは…";
    answerName.textContent = result.name + " でした！";

    if (isHit){
      hitBanner.classList.add("show");
      spawnConfetti(true);
    } else {
      missLine.textContent = "残念、予想とは違ったみたい。また当ててみてね";
      missLine.classList.add("show");
      spawnConfetti(false);
    }

    retryBtn.style.display = "inline-block";
  }

  startGuessBtn.addEventListener("click", playGuess);

  retryBtn.addEventListener("click", () => {
    resultCard.classList.remove("show");
    window.scrollTo({ top: 0, behavior: "smooth" });
    playStorySequence();
  });

  playStorySequence();
</script>

</html>
